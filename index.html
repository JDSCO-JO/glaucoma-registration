<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approach to Patients with Glaucoma - Registration</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        .hero-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 0;
            border-bottom: 5px solid #00d2ff;
        }
        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: white;
        }
        .btn-choice {
            padding: 20px;
            font-size: 1.25rem;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .counter-badge {
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="fw-bold mb-2">Approach to Patients with Glaucoma</h1>
            <p class="lead mb-0">الندوة العلمية المتخصصة لأطباء العيون والمهتمين</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <!-- خطوة اختيار نوع الحضور -->
                <div id="step-1" class="card card-custom p-4 text-center mb-4">
                    <h3 class="fw-bold mb-4 text-secondary">الرجاء اختيار طريقة الحضور المفضلة:</h3>
                    <div class="d-grid gap-3">
                        <button type="button" class="btn btn-outline-primary btn-choice position-relative" onclick="selectType('f2f')">
                            📍 حضور وجاهي (Face to Face)
                            <span class="position-absolute top-0 start-50 translate-middle badge rounded-pill bg-danger counter-badge" id="f2f-badge" style="display:none;"></span>
                        </button>
                        <button type="button" class="btn btn-outline-success btn-choice position-relative" onclick="selectType('online')">
                            💻 حضور افتراضي (Online)
                            <span class="position-absolute top-0 start-50 translate-middle badge rounded-pill bg-danger counter-badge" id="online-badge" style="display:none;"></span>
                        </button>
                    </div>
                </div>

                <!-- خطوة استمارة البيانات -->
                <div id="step-2" class="card card-custom p-4" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold m-0 text-primary" id="form-title">إكمال بيانات التسجيل</h3>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="goBack()">تغيير نوع الحضور</button>
                    </div>

                    <!-- iframe مخفي لمنع إعادة التوجيه لصفحة جوجل بعد الإرسال -->
                    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { window.location.href='thanks.html'; }"></iframe>

                    <!-- نموذج الإرسال المرتبط بـ Google Form الخاص بك مباشرة -->
                    <form id="reg-form" action="https://docs.google.com/forms/d/e/1FAIpQLSfT_aKT8RePcFatm9uYUBJ5F-RQhD-bBV8u7oHvThCrokYO2g/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                        
                        <!-- الحقول السحرية المربوطة بـ Google Form -->
                        <input type="hidden" id="input-type" name="entry.298455297">

                        <div class="mb-3">
                            <label for="fullName" class="form-label">الاسم الكامل (باللغة الإنجليزية للشهادة) *</label>
                            <input type="text" name="entry.1407695842" id="fullName" class="form-control" required placeholder="Dr. First Last">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">البريد الإلكتروني *</label>
                            <input type="email" name="entry.1695785341" id="email" class="form-control" required placeholder="name@example.com">
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">رقم الهاتف / الواتساب *</label>
                            <input type="tel" name="entry.440707602" id="phone" class="form-control" required placeholder="07XXXXXXXX">
                        </div>

                        <div class="mb-3">
                            <label for="specialty" class="form-label">التخصص الطبي *</label>
                            <select name="entry.1644307014" id="specialty" class="form-select" required>
                                <option value="" disabled selected>اختر التخصص...</option>
                                <option value="Ophthalmologist">طبيب عيون (Ophthalmologist)</option>
                                <option value="Ophthalmology Resident">مقيم عيون (Ophthalmology Resident)</option>
                                <option value="Optometrist">فاحص بصر / اختصاصي بصريات (Optometrist)</option>
                                <option value="General Practitioner / Family Medicine">طبيب أسرة / طبيب عام</option>
                                <option value="Other Medical Specialty">تخصص طبي آخر</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold" id="submitBtn">تأكيد حجز المقعد والتسجيل</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        let submitted = false;

        // دالة اختيار نوع الحضور
        function selectType(type) {
            document.getElementById('input-type').value = type === 'f2f' ? 'Face to Face' : 'Online';
            document.getElementById('form-title').innerText = type === 'f2f' ? 'التسجيل للحضور الوجاهي 📍' : 'التسجيل للحضور الافتراضي 💻';
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        // دالة العودة للخطوة السابقة
        function goBack() {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
        }
    </script>
</body>
</html>
