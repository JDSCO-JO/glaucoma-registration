<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approach to Patients with Glaucoma - Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f6; color: #333; }
        .hero-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 40px 0; border-bottom: 5px solid #00d2ff; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; }
        .btn-choice { padding: 20px; font-size: 1.25rem; font-weight: 700; border-radius: 12px; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="fw-bold mb-2">Approach to Patients with Glaucoma</h1>
            <p class="lead mb-0">الندوة العلمية المتخصصة - استمارة التسجيل</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div id="step-1" class="card card-custom p-4 text-center mb-4">
                    <h3 class="fw-bold mb-4 text-secondary">الرجاء اختيار طريقة الحضور المفضلة:</h3>
                    <div class="d-grid gap-3">
                        <button type="button" class="btn btn-outline-primary btn-choice" onclick="selectType('Face to Face')">📍 حضور وجاهي (Face to Face)</button>
                        <button type="button" class="btn btn-outline-success btn-choice" onclick="selectType('Online')">💻 حضور افتراضي (Online)</button>
                    </div>
                </div>

                <div id="step-2" class="card card-custom p-4" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold m-0 text-primary" id="form-title">إكمال بيانات التسجيل</h3>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="goBack()">تغيير نوع الحضور</button>
                    </div>

                    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { alert('تم التسجيل بنجاح! شكراً لك.'); window.location.reload(); }"></iframe>

                    <form id="reg-form" action="https://docs.google.com/forms/d/e/1FAIpQLSfT_aKT8RePcFatm9uYUBJ5F-RQhD-bBV8u7oHvThCrokYO2g/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                        
                        <input type="hidden" id="input-type" name="entry.298455297">

                        <div class="mb-3">
                            <label class="form-label">الاسم الكامل (English) *</label>
                            <input type="text" name="entry.1407695842" id="fullName" class="form-control" required placeholder="Dr. First Last">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">البريد الإلكتروني *</label>
                            <input type="email" name="entry.1695785341" id="email" class="form-control" required placeholder="name@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">رقم الهاتف / الواتساب *</label>
                            <input type="tel" name="entry.440707602" id="phone" class="form-control" required placeholder="07XXXXXXXX">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">التخصص الطبي *</label>
                            <input type="text" name="entry.1644307014" id="specialty" class="form-control" required placeholder="مثال: Ophthalmologist">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold">تأكيد حجز المقعد والتسجيل</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        let submitted = false;
        function selectType(type) {
            document.getElementById('input-type').value = type;
            document.getElementById('form-title').innerText = type === 'Face to Face' ? 'التسجيل للحضور الوجاهي 📍' : 'التسجيل للحضور الافتراضي 💻';
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }
        function goBack() {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
        }
    </script>
</body>
</html>
